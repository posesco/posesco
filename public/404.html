<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | [posesco]</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/css">
        @theme {
            --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
            --font-display: "Outfit", ui-sans-serif, system-ui, sans-serif;
            --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        }

        :root {
            --slate-950: #020617;
            --indigo-500: #6366f1;
            --indigo-400: #818cf8;
        }

        body {
            background-color: var(--slate-950);
            color: #cbd5e1;
            font-family: var(--font-sans);
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.1), transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05), transparent 30%);
            z-index: -1;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* SVG 404 Animation */
        .svg-404 {
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.3));
        }

        .text-outline {
            fill: none;
            stroke: var(--indigo-500);
            stroke-width: 2;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: draw 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes draw {
            0% { stroke-dashoffset: 800; opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { stroke-dashoffset: 0; opacity: 0.2; }
        }

        .text-fill {
            fill: url(#textGradient);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.15; transform: scale(1.02); }
        }

        .glitch-layer {
            fill: none;
            stroke: #60a5fa;
            stroke-width: 1;
            opacity: 0;
            animation: glitch-anim 5s infinite;
        }

        @keyframes glitch-anim {
            0%, 95%, 100% { opacity: 0; transform: translate(0); }
            96% { opacity: 0.5; transform: translate(-4px, 2px); }
            97% { opacity: 0.5; transform: translate(4px, -2px); }
            98% { opacity: 0.5; transform: translate(-2px, -2px); }
        }

        .btn-shine {
            position: relative;
            overflow: hidden;
        }

        .btn-shine::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .btn-shine:hover::after {
            left: 100%;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="max-w-xl w-full px-6">
        <div class="glass-panel rounded-[2.5rem] p-12 md:p-16 text-center border-t-2 border-indigo-500/30">
            <!-- Brand -->
            <div class="font-display font-bold text-xl tracking-tight mb-8 flex justify-center items-center gap-1">
                <span class="text-indigo-500">[</span>
                <span class="text-slate-200">posesco</span>
                <span class="text-indigo-500">]</span>
            </div>

            <!-- Animated SVG 404 -->
            <div class="relative h-40 md:h-52 w-full mb-6 flex justify-center items-center">
                <svg viewBox="0 0 400 150" class="svg-404 w-full h-full">
                    <defs>
                        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#60a5fa" />
                            <stop offset="50%" style="stop-color:#818cf8" />
                            <stop offset="100%" style="stop-color:#a78bfa" />
                        </linearGradient>
                    </defs>
                    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
                          class="text-fill font-display font-extrabold" style="font-size: 140px;">
                        404
                    </text>
                    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
                          class="text-outline font-display font-extrabold" style="font-size: 140px;">
                        404
                    </text>
                    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
                          class="glitch-layer font-display font-extrabold" style="font-size: 140px;">
                        404
                    </text>
                </svg>
            </div>
            
            <div id="content-en">
                <h2 class="text-3xl md:text-4xl font-display font-bold mb-6 text-slate-50">Page Not Found</h2>
                <p class="text-slate-400 text-lg mb-12 leading-relaxed">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <a href="/" class="inline-flex items-center px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-600/20 btn-shine">
                    Back to Home
                </a>
            </div>

            <div id="content-es" style="display: none;">
                <h2 class="text-3xl md:text-4xl font-display font-bold mb-6 text-slate-50">Página no encontrada</h2>
                <p class="text-slate-400 text-lg mb-12 leading-relaxed">
                    La página que buscas no existe o ha sido movida.
                </p>
                <a href="/" class="inline-flex items-center px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all shadow-xl shadow-indigo-600/20 btn-shine">
                    Volver al Inicio
                </a>
            </div>

            <!-- Decorative terminal dots -->
            <div class="flex justify-center gap-2 mt-12 opacity-30">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
            </div>
        </div>
    </div>

    <script>
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('es')) {
            document.getElementById('content-en').style.display = 'none';
            document.getElementById('content-es').style.display = 'block';
        }

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.querySelector('.bg-gradient').style.backgroundImage = `
                radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.05), transparent 30%)
            `;
        });
    </script>
</body>
</html>
